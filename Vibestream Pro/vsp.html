<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibestream Pro</title>
<link rel="stylesheet" href="vstyle.css">
</head>
<body>

<div class="navbar">
    <h1>VibeStream Pro</h1>
    <input type="text" placeholder="Search...">
</div>

<div class="container">


    <div class="sidebar">
        <ul>
            <li>Home</li>
            <li>Trending</li>
            <li>Your Library</li>
            <li>Liked Songs</li>
        </ul>
    </div>

  
    <div class="main">

        
        <div class="songcard">
            <div class="cover"></div>
            <div class="songinfo">
                <h3>Song Title 1</h3>
                <p>Artist Name 1</p>
                <audio controls>
                    <source src="song1.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

        
        <div class="songcard">
            <div class="cover"></div>
            <div class="songinfo">
                <h3>Song Title 2</h3>
                <p>Artist Name 2</p>
                <audio controls>
                    <source src="song2.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

       
        <div class="songcard">
            <div class="cover"></div>
            <div class="songinfo">
                <h3>Song Title 3</h3>
                <p>Artist Name 3</p>
                <audio controls>
                    <source src="song3.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>

    </div>
</div>

</body>
</html>
